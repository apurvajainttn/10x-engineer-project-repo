version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    volumes:
      - ./backend:/app
      - /app/__pycache__/
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
